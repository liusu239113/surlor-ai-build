name: Build Surlor AI APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/daemon
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: |
        ./gradlew :app:assembleDebug --no-daemon --stacktrace
      env:
        GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=1g -XX:+UseG1GC
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: surlor-ai-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Publish debug APK to GitHub Release
      if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p release
        cp app/build/outputs/apk/debug/*.apk release/app-debug.apk
        gh release delete latest-debug --yes || true
        gh release create latest-debug \
          --title "Latest Debug APK" \
          --notes "Auto-generated debug build from main branch (Run ${{ github.run_id }})." \
          --prerelease \
          release/app-debug.apk

    - name: Upload Build Logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: |
          app/build/reports/
          ~/.gradle/daemon/
        retention-days: 7
